        const files = [{"name": "dashboard.html", "rel_path": "dashboard.html", "path": "dashboard.html", "size": "25.1KB", "icon": "🌐", "type": "html", "type_name": "HTML", "content": "[Binary file]", "is_subdir": false}, {"name": "calls.png", "rel_path": "calls.png", "path": "calls.png", "size": "351.9KB", "icon": "🖼️", "type": "image", "type_name": "Image", "content": "[Binary file]", "is_subdir": false}, {"name": "compact_flow.png", "rel_path": "compact_flow.png", "path": "compact_flow.png", "size": "38.4KB", "icon": "🖼️", "type": "image", "type_name": "Image", "content": "[Binary file]", "is_subdir": false}, {"name": "flow.png", "rel_path": "flow.png", "path": "flow.png", "size": "14.3KB", "icon": "🖼️", "type": "image", "type_name": "Image", "content": "[Binary file]", "is_subdir": false}, {"name": "README.md", "rel_path": "README.md", "path": "README.md", "size": "9.3KB", "icon": "📝", "type": "markdown", "type_name": "Markdown", "content": "# code2llm - Generated Analysis Files\n\nThis directory contains the complete analysis of your project generated by `code2llm`. Each file serves a specific purpose for understanding, refactoring, and documenting your codebase.\n\n## 📁 Generated Files Overview\n\nWhen you run `code2llm ./ -f all`, the following files are created:\n\n### 🎯 Core Analysis Files\n\n| File | Format | Purpose | Key Insights |\n|------|--------|---------|--------------|\n| `evolution.toon.yaml` | **YAML** | **📋 Refactoring queue** - Prioritized improvements | 0 refactoring actions needed |\n| `map.toon.yaml` | **YAML** | **🗺️ Structural map + project header** - Modules, imports, exports, signatures, stats, alerts, hotspots, trend | Project architecture overview |\n\n### 🤖 LLM-Ready Documentation\n\n| File | Format | Purpose | Use Case |\n|------|--------|---------|----------|\n| `prompt.txt` | **Text** | **📝 Ready-to-send prompt** - Lists all files with instructions | Attach to LLM conversation as context guide |\n| `context.md` | **Markdown** | **📖 LLM narrative** - Architecture summary | Paste into ChatGPT/Claude for code analysis |\n\n### 📊 Visualizations\n\n| File | Format | Purpose | Description |\n|------|--------|---------|-------------|\n| `flow.mmd` | **Mermaid** | **🔄 Control flow diagram** | Function call paths with complexity styling |\n| `calls.mmd` | **Mermaid** | **📞 Call graph** | Function dependencies (edges only) |\n| `compact_flow.mmd` | **Mermaid** | **📦 Module overview** | Aggregated module-level view |\n\n## 🚀 Quick Start Commands\n\n### Basic Analysis\n```bash\n# Quick health check (TOON format only)\ncode2llm ./ -f toon\n\n# Generate all formats (what created these files)\ncode2llm ./ -f all\n\n# LLM-ready context only\ncode2llm ./ -f context\n```\n\n### Performance Options\n```bash\n# Fast analysis for large projects\ncode2llm ./ -f toon --strategy quick\n\n# Memory-limited analysis\ncode2llm ./ -f all --max-memory 500\n\n# Skip PNG generation (faster)\ncode2llm ./ -f all --no-png\n```\n\n### Refactoring Focus\n```bash\n# Get refactoring recommendations\ncode2llm ./ -f evolution\n\n# Focus on specific code smells\ncode2llm ./ -f toon --refactor --smell god_function\n\n# Data flow analysis\ncode2llm ./ -f flow --data-flow\n```\n\n## 📖 Understanding Each File\n\n### `analysis.toon` - Health Diagnostics\n**Purpose**: Quick overview of code health issues\n**Key sections**:\n- **HEALTH**: Critical issues (🔴) and warnings (🟡)\n- **REFACTOR**: Prioritized refactoring actions\n- **COUPLING**: Module dependencies and potential cycles\n- **LAYERS**: Package complexity metrics\n- **FUNCTIONS**: High-complexity functions (CC ≥ 10)\n- **CLASSES**: Complex classes needing attention\n\n**Example usage**:\n```bash\n# View health issues\ncat analysis.toon | head -30\n\n# Check refactoring priorities\ngrep \"REFACTOR\" analysis.toon\n```\n\n### `evolution.toon.yaml` - Refactoring Queue\n**Purpose**: Step-by-step refactoring plan\n**Key sections**:\n- **NEXT**: Immediate actions to take\n- **RISKS**: Potential breaking changes\n- **METRICS-TARGET**: Success criteria\n\n**Example usage**:\n```bash\n# Get refactoring plan\ncat evolution.toon.yaml\n\n# Track progress\ngrep \"NEXT\" evolution.toon.yaml\n```\n\n### `flow.toon` - Legacy Data Flow Analysis\n**Purpose**: Understand data movement through the system (legacy / explicit opt-in)\n**Key sections**:\n- **PIPELINES**: Data processing chains\n- **CONTRACTS**: Function input/output contracts\n- **SIDE_EFFECTS**: Functions with external impacts\n\n**Example usage**:\n```bash\n# Find data pipelines\ngrep \"PIPELINES\" flow.toon\n\n# Identify side effects\ngrep \"SIDE_EFFECTS\" flow.toon\n```\n\n### `map.toon.yaml` - Structural Map + Project Header\n**Purpose**: High-level architecture overview plus compact project header\n**Key sections**:\n- **MODULES**: All modules with basic stats\n- **IMPORTS**: Dependency relationships\n- **EXPORTS**: Public API surface and signatures\n- **HEADER**: Stats, alerts, hotspots, evolution trend\n\n**Example usage**:\n```bash\n# See project structure\ncat map.toon.yaml | head -50\n\n# Find public APIs\ngrep \"SIGNATURES\" map.toon.yaml\n```\n\n### `project.toon.yaml` - Compact Analysis View\n**Purpose**: Compact module view generated from project.yaml data\n**Status**: Legacy view generated on demand from unified project.yaml\n\n**Example usage**:\n```bash\n# View compact project structure\ncat project.toon.yaml | head -30\n\n# Find largest files\ngrep -E \"^  .*[0-9]{3,}$\" project.toon.yaml | sort -t',' -k2 -n -r | head -10\n```\n\n### `prompt.txt` - Ready-to-Send LLM Prompt\n**Purpose**: Pre-formatted prompt listing all generated files for LLM conversation\n**Generation**: Written when `code2llm` runs with a source path and requests `-f all` (including `--no-chunk`) or `code2logic`\n**Contents**:\n- **Files section**: Lists all existing generated files with descriptions, including `project.toon.yaml` when generated by `-f all`\n- **Source files section**: Highlights important source files such as `cli_exports/orchestrator.py`\n- **Missing section**: Shows which files weren't generated (if any)\n- **Task section**: Refactoring brief with concrete execution instructions, not just analysis\n- **Priority Order section**: State-dependent refactoring priorities, starting with blockers and then architecture cleanup\n- **Requirements section**: Guidelines for suggested changes\n\n**Example usage**:\n```bash\n# View the prompt\ncat prompt.txt\n\n# Copy to clipboard and paste into ChatGPT/Claude\ncat prompt.txt | pbcopy  # macOS\ncat prompt.txt | xclip -sel clip  # Linux\n```\n\n### `context.md` - LLM Narrative\n**Purpose**: Ready-to-paste context for AI assistants\n**Key sections**:\n- **Overview**: Project statistics\n- **Architecture**: Module breakdown\n- **Entry Points**: Public interfaces\n- **Patterns**: Design patterns detected\n\n**Example usage**:\n```bash\n# Copy to clipboard for LLM\ncat context.md | pbcopy  # macOS\ncat context.md | xclip -sel clip  # Linux\n\n# Use with Claude/ChatGPT for code analysis\n```\n\n### Visualization Files (`*.mmd`, `*.png`)\n**Purpose**: Visual understanding of code structure\n**Files**:\n- `flow.mmd` - Detailed control flow with complexity colors\n- `calls.mmd` - Simple call graph\n- `compact_flow.mmd` - High-level module view\n- `*.png` - Pre-rendered images\n\n**Example usage**:\n```bash\n# View diagrams\nopen flow.png  # macOS\nxdg-open flow.png  # Linux\n\n# Edit in Mermaid Live Editor\n# Copy content of .mmd files to https://mermaid.live\n```\n\n## 🔍 Common Analysis Patterns\n\n### 1. Code Health Assessment\n```bash\n# Quick health check\ncode2llm ./ -f toon\ncat analysis.toon | grep -E \"(HEALTH|REFACTOR)\"\n```\n\n### 2. Refactoring Planning\n```bash\n# Get refactoring queue\ncode2llm ./ -f evolution\ncat evolution.toon.yaml\n\n# Focus on specific issues\ncode2llm ./ -f toon --refactor --smell god_function\n```\n\n### 3. LLM Assistance\n```bash\n# Generate context for AI\ncode2llm ./ -f context\ncat context.md\n\n# Use with Claude: \"Based on this context, help me refactor the god modules\"\n```\n\n### 4. Team Documentation\n```bash\n# Generate all docs for team\ncode2llm ./ -f all -o ./docs/\n\n# Create visual diagrams\nopen docs/flow.png\n```\n\n## 📊 Interpreting Metrics\n\n### Complexity Metrics (CC)\n- **🔴 Critical (≥5.0)**: Immediate refactoring needed\n- **🟠 High (3.0-4.9)**: Consider refactoring\n- **🟡 Medium (1.5-2.9)**: Monitor complexity\n- **🟢 Low (0.1-1.4)**: Acceptable\n- **⚪ Basic (0.0)**: Simple functions\n\n### Module Health\n- **GOD Module**: Too large (>500 lines, >20 methods)\n- **HUB**: High fan-out (calls many modules)\n- **FAN-IN**: High incoming dependencies\n- **CYCLES**: Circular dependencies\n\n### Data Flow Indicators\n- **PIPELINE**: Sequential data processing\n- **CONTRACT**: Clear input/output specification\n- **SIDE_EFFECT**: External state modification\n\n## 🛠️ Integration Examples\n\n### CI/CD Pipeline\n```bash\n#!/bin/bash\n# Analyze code quality in CI\ncode2llm ./ -f toon -o ./analysis\nif grep -q \"🔴 GOD\" ./analysis/analysis.toon; then\n    echo \"❌ God modules detected\"\n    exit 1\nfi\n```\n\n### Pre-commit Hook\n```bash\n#!/bin/sh\n# .git/hooks/pre-commit\ncode2llm ./ -f toon -o ./temp_analysis\nif grep -q \"🔴\" ./temp_analysis/analysis.toon; then\n    echo \"⚠️  Critical issues found. Review before committing.\"\nfi\nrm -rf ./temp_analysis\n```\n\n### Documentation Generation\n```bash\n# Generate docs for README\ncode2llm ./ -f context -o ./docs/\necho \"## Architecture\" >> README.md\ncat docs/context.md >> README.md\n```\n\n## 📚 Next Steps\n\n1. **Review `analysis.toon`** - Identify critical issues\n2. **Check `evolution.toon.yaml`** - Plan refactoring priorities\n3. **Use `context.md`** - Get LLM assistance for complex changes\n4. **Reference visualizations** - Understand system architecture\n5. **Track progress** - Re-run analysis after changes\n\n## 🔧 Advanced Usage\n\n### Custom Analysis\n```bash\n# Deep analysis wi cs.analyzers.code_metrics.CodeMetricsAnalyzer.__init__, todocs.analyzers.code_metrics.CodeMetricsAnalyzer._should_skip, todocs.analyzers.code_metrics.CodeMetricsAnalyzer._is_test, todocs.analyzers.code_metrics.CodeMetricsAnalyzer._scan, todocs.analyzers.code_metrics.CodeMetricsAnalyzer._count_lines\n\n## Public API Surface\n\nFunctions exposed as public API (no underscore prefix):\n\n- `examples.article_sections_demo.main` - 64 calls\n- `examples.scan_single.main` - 57 calls\n- `examples.organization_health_report.print_health_summary` - 48 calls\n- `todocs.generators.article_sections.render_architecture` - 33 calls\n- `todocs.analyzers.maturity.MaturityScorer.score` - 28 calls\n- `examples.scan_org.main` - 26 calls\n- `examples.api_surface_deep.main` - 26 calls\n- `examples.api_surface_deep.analyze_public_symbols` - 24 calls\n- `examples.organization_health_report.main` - 23 calls\n- `todocs.extractors.toon_parser.ToonParser.parse_flow` - 23 calls\n- `todocs.generators.article_sections.render_docker` - 23 calls\n- `todocs.cli.export_cmd` - 22 calls\n- `todocs.cli.readme` - 21 calls\n- `todocs.outputs.markdown.MarkdownOutput.write_all` - 20 calls\n- `todocs.generators.article_sections.render_metrics` - 19 calls\n- `todocs.generators.article_sections.render_usage` - 19 calls\n- `todocs.analyzers.structure.StructureAnalyzer.detect_tech_stack` - 19 calls\n- `todocs.analyzers.code_metrics.CodeMetricsAnalyzer.analyze` - 19 calls\n- `todocs.cli.compare` - 18 calls\n- `todocs.analyzers.import_graph.ImportGraphAnalyzer.build_graph` - 18 calls\n- `todocs.cli.generate` - 17 calls\n- `todocs.cli.inspect` - 17 calls\n- `todocs.cli.index` - 17 calls\n- `todocs.extractors.docker_parser.DockerParser.parse` - 16 calls\n- `todocs.generators.article_sections.render_tech_stack` - 16 calls\n- `todocs.core.scan_organization` - 16 calls\n- `examples.api_surface_deep.analyze_rest_endpoints` - 15 calls\n- `todocs.cli.health` - 15 calls\n- `todocs.cli.status` - 15 calls\n- `todocs.cli.cards` - 15 calls\n- `todocs.core.generate_articles` - 15 calls\n- `todocs.generators.article_sections.render_api_surface` - 14 calls\n- `examples.api_surface_deep.analyze_cli_commands` - 13 calls\n- `examples.api_surface_deep.analyze_symbol_sources` - 13 calls\n- `todocs.outputs.html.HTMLOutput.render` - 13 calls\n- `todocs.generators.status_report_gen.StatusReportGenerator.render` - 13 calls\n- `examples.custom_analysis.main` - 12 calls\n- `todocs.formatters.table_formatter.TableFormatter.format_matrix` - 12 calls\n- `todocs.generators.article_sections.render_dependencies` - 12 calls\n- `todocs.extractors.metadata.MetadataExtractor.extract` - 12 calls\n\n## System Interactions\n\nHow components interact:\n\n```mermaid\ngraph TD\n    main --> resolve\n    main --> scan_project\n    main --> print\n    main --> len\n    _render_index --> append\n    _render_index --> sum\n    _parse_compose --> get\n    _parse_compose --> items\n    _parse_compose --> list\n    _parse_compose --> safe_load\n    _parse_compose --> isinstance\n    _render_category --> append\n    score --> is_dir\n    score --> exists\n    _from_pyproject --> get\n    main --> Path\n    main --> scan_organization\n    main --> ArgumentParser\n    main --> add_argument\n    parse_flow --> _read\n    parse_flow --> match\n    parse_flow --> splitlines\n    parse_flow --> int\n    export_cmd --> command\n    export_cmd --> argument\n    export_cmd --> option\n    _parse_dockerfile --> splitlines\n    _parse_dockerfile --> read_text\n    _parse_dockerfile --> strip\n    _parse_dockerfile --> match\n```\n\n## Reverse Engineering Guidelines\n\n1. **Entry Points**: Start analysis from the entry points listed above\n2. **Core Logic**: Focus on classes with many methods\n3. **Data Flow**: Follow data transformation functions\n4. **Process Flows**: Use the flow diagrams for execution paths\n5. **API Surface**: Public API functions reveal the interface\n\n## Context for LLM\n\nMaintain the identified architectural patterns and public API surface when suggesting changes.", "is_subdir": false}, {"name": "refactoring-plan.md", "rel_path": "refactoring-plan.md", "path": "refactoring-plan.md", "size": "8.2KB", "icon": "📝", "type": "markdown", "type_name": "Markdown", "content": "# Refactoring Plan: code2docs ↔ todocs\n\n> Status: In Progress | Created: 2026-03-08 | Updated: 2026-03-08\n\n## Current State\n\nBoth scopes live in one `code2docs` package (64 files, 9010 lines).\n`todocs` has been extracted as a standalone package (Phase 3 ✅).\n\n## Responsibility Split\n\n### code2docs — single-project documentation\n> \"Generate full documentation for THIS repository\"\n\n| Module | Role |\n|--------|------|\n| readme_gen | README.md from analysis |\n| api_reference_gen | docs/api.md |\n| module_docs_gen | docs/modules.md |\n| architecture_gen | docs/architecture.md + Mermaid |\n| examples_gen | examples/ from API signatures |\n| getting_started_gen | docs/getting-started.md |\n| contributing_gen | CONTRIBUTING.md |\n| coverage_gen | docs/coverage.md |\n| depgraph_gen | docs/dependency-graph.md |\n| changelog_gen | CHANGELOG.md from git log |\n| api_changelog_gen | API changelog from diffs |\n| config_docs_gen | docs/configuration.md |\n| code2llm_gen | code2llm analysis → project/ |\n| mkdocs_gen | mkdocs.yml |\n\n**Infrastructure**: analyzers/, formatters/, sync/, config.py, registry.py, cli.py, llm_helper.py\n\n### todocs — multi-project organization overview\n> \"Summarize all projects in THIS folder/organization\"\n\n| Module | Role | Status |\n|--------|------|--------|\n| article.py | WordPress-ready project articles | ✅ |\n| article_sections.py | Section renderers | ✅ |\n| comparison.py | Cross-project comparison | ✅ |\n| project_card_gen.py | Single project card (WordPress) | ✅ |\n| org_index_gen.py | Organization index.md/catalog | ✅ |\n| status_report_gen.py | Organization status report | ✅ |\n| formatters/table_formatter.py | Comparative project tables | ✅ |\n| outputs/markdown.py | WordPress-ready Markdown output | ✅ |\n| outputs/html.py | HTML output | ✅ |\n| outputs/json.py | JSON output (API/dashboards) | ✅ |\n\n## Overlaps & Duplicates\n\n### 2.1 Shared code2llm dependency\nBoth use `code2llm.api.analyze()` / `AnalysisResult`:\n- **code2docs**: via ProjectScanner → full single-project analysis\n- **todocs** (formerly org_readme_gen): via `_analyze_project()` → simplified multi-project analysis\n\n**Current todocs status**: No code2llm dependency — uses own static analysis pipeline.\n\n### 2.2 Project description extraction\n`_extract_description()` (CC=17) duplicated fragments from ReadmeGenerator._extract_project_metadata() (CC=29).\n\n**Current todocs status**: Uses own `MetadataExtractor` — independent implementation.\n\n### 2.3 Shared formatters\nBoth use MarkdownFormatter, badges, toc — todocs needs only a subset.\n\n### 2.4 Config\n`Code2DocsConfig` contains config for both single-project and org-level. `org_name` in CLI switches mode.\n\n### 2.5 CLI\n`generate --org-name` activates OrgReadmeAdapter — mixing two modes.\n\n## Refactoring Phases\n\n### Phase 1: Extract shared core → code2docs-core ❌ Blocked (needs code2docs repo)\n\n```\ncode2docs-core/\n├── project_metadata.py    ← shared description/version/URL extraction\n├── analysis_bridge.py     ← quick_analyze + full_analyze\n├── formatters/\n│   ├── markdown.py\n│   └── badges.py\n└── llm_helper.py\n```\n\n### Phase 2: Clean up code2docs ❌ Blocked (needs code2docs repo)\n\n- ReadmeGenerator → delegates to core.extract_project_info()\n- Remove OrgReadmeGenerator, OrgReadmeAdapter\n- Remove --org-name from CLI\n- Remove org-level config fields\n\n### Phase 3: todocs as standalone package ✅ DONE\n\nCurrent todocs structure:\n```\ntodocs/\n├── analyzers/          (6 modules)\n├── extractors/         (6 modules)\n├── generators/         (6 modules: article, article_sections, comparison,\n│                        project_card_gen, status_report_gen, org_index_gen)\n├── form /wronai/code2docs` (v3.0.9)\n\n**Architecture**: code2docs depends on `code2llm` for analysis, uses a `BaseGenerator` + `GeneratorRegistry` pattern. 14 generators, formatters, sync/watcher, LLM helper.\n\n**Overlap analysis**:\n\n| Area | code2docs | todocs | Shared potential |\n|------|-----------|--------|------------------|\n| Dependency scanning | `DependencyScanner` (richer, returns `DependencyInfo` dataclass) | `DependencyAnalyzer` (simpler, returns `List[str]`) | Medium — different granularity |\n| Project metadata | Via `code2llm.api.AnalysisResult` | Own `MetadataExtractor` | Low — different data sources |\n| Markdown formatting | `formatters/markdown.py`, `badges.py`, `toc.py` | Inline in generators | Low — todocs is simpler |\n| Config | `Code2DocsConfig` dataclass | Minimal (CLI args only) | None |\n| CLI | `click`-based, single `generate` + sub-modes | `click`-based, 9 commands | None — distinct UIs |\n\n**Assessment**:\n- **Phase 1 (shared core)**: Low priority. The overlap is limited to dependency scanning and some formatting utilities. The packages use different analysis backends (`code2llm` vs todocs' own AST-based pipeline). Extracting a shared core would add coupling for minimal dedup (~100 LOC).\n- **Phase 2 (clean code2docs)**: Independent of todocs. The `OrgReadmeGenerator`/`OrgReadmeAdapter` in code2docs can be deprecated in favor of todocs, but this is a code2docs-side change.\n- **Recommendation**: Keep packages independent. Phase 1 is not cost-effective. Phase 2 can proceed as a code2docs cleanup task (remove org-level code, point users to todocs for multi-project docs).\n\n## Complementarity Matrix (post-refactoring)\n\n| Function | code2docs-core | code2docs | todocs |\n|----------|---------------|-----------|--------|\n| Project metadata extraction | ✅ | — | — |\n| MarkdownFormatter | ✅ | — | — |\n| LLM Helper | ✅ | — | — |\n| code2llm bridge | ✅ | — | — |\n| Single-project README | — | ✅ | — |\n| API reference | — | ✅ | — |\n| Module/ar         let currentFile = null;

        function renderFileList(filter = '') {
            const list = document.getElementById('fileList');
            const filtered = files.filter(f => 
                f.name.toLowerCase().includes(filter.toLowerCase()) ||
                f.path.toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">No files found</div>';
                return;
            }
            
            // Group by type
            const groups = {};
            for (const file of filtered) {
                const type = file.type_name;
                if (!groups[type]) groups[type] = [];
                groups[type].push(file);
            }
            
            let html = '';
            for (const [typeName, groupFiles] of Object.entries(groups)) {
                html += `
                    <div class="file-group">
                        <div class="file-group-title">${typeName} Files (${groupFiles.length})</div>
                        ${groupFiles.map(f => `
                            <div class="file-item ${currentFile?.name === f.name ? 'active' : ''}" 
                                 onclick="selectFile('${f.name}')">
                                <span class="file-icon">${f.icon}</span>
                                <div class="file-info">
                                    <div class="file-name">${f.name}</div>
                                    <div class="file-meta">${f.path}</div>
                                </div>
                                <span class="file-size">${f.size}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            list.innerHTML = html;
        }

        function selectFile(name) {
            const file = files.find(f => f.name === name);
            if (!file) return;
            
            currentFile = file;
            
            document.getElementById('contentIcon').textContent = file.icon;
            document.getElementById('contentTitle').textContent = file.name;
            
            // Actions
            const actions = document.getElementById('contentActions');
            actions.innerHTML = `
                <a href="${file.rel_path}" download class="btn">⬇ Download</a>
                <a href="${file.rel_path}" target="_blank" class="btn btn-primary">↗ Open Raw</a>
            `;
            
            // Content
            const body = document.getElementById('contentBody');
            if (file.type === 'markdown') {
                // Render markdown as HTML using marked.js
                body.innerHTML = `<div class="markdown-content">${marked.parse(file.content)}</div>`;
            } else if (file.type === 'html') {
                // For HTML files, show in iframe for safety
                body.innerHTML = `<iframe src="${file.rel_path}" style="width:100%;height:100%;border:none;border-radius:0.5rem;"></iframe>`;
            } else if (file.type === 'image') {
                // For images, display the actual image
                body.innerHTML = `<div class="image-preview"><img src="${file.rel_path}" alt="${file.name}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:0.5rem;"></div>`;
            } else if (file.type === 'mermaid') {
                // Render mermaid diagram
                const diagramId = 'mermaid-diagram-' + Date.now();
                body.innerHTML = `<div class="mermaid-content"><pre class="mermaid" id="${diagramId}">${file.content}</pre></div>`;
                // Initialize mermaid on the new element
                setTimeout(() => {
                    mermaid.init(undefined, document.getElementById(diagramId));
                }, 0);
            } else if (file.type === 'json') {
                try {
                    const json = JSON.parse(file.content.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&'));
                    const formatted = JSON.stringify(json, null, 2);
                    body.innerHTML = `<pre><code class="language-json">${formatted.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                    hljs.highlightElement(body.querySelector('code'));
                } catch {
                    body.innerHTML = `<pre>${file.content}</pre>`;
                }
            } else if (file.type === 'yaml') {
                // YAML with syntax highlighting
                body.innerHTML = `<pre><code class="language-yaml">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'toon') {
                // TOON with simple highlighting (use ini as closest match for key: value format)
                body.innerHTML = `<pre><code class="language-ini">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'code') {
                // Code files with auto-highlighting
                body.innerHTML = `<pre><code>${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else {
                body.innerHTML = `<pre>${file.content}</pre>`;
            }
            
            renderFileList(document.getElementById('search').value);
        }

        function filterFiles(query) {
            renderFileList(query);
        }

        function renderStats() {
            const stats = {};
            for (const f of files) {
                stats[f.type_name] = (stats[f.type_name] || 0) + 1;
            }
            
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = Object.entries(stats)
                .sort((a, b) => b[1] - a[1])
                .map(([type, count]) => `
                    <div class="stat-card">
                        <div class="stat-value">${count}</div>
                        <div class="stat-label">${type}</div>
                    </div>
                `).join('');
        }

        // Initialize
        renderStats();
        renderFileList();
        
        // Select first file if available
        if (files.length > 0) {
            selectFile(files[0].name);
        }
    </script>
